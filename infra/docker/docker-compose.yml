# ============================================================================
# Networks
# ============================================================================

networks:
  simnet:
    driver: bridge

# ============================================================================
# Volumes
# ============================================================================

# NOTE: Before running docker-compose, set DATA_DIR to your host data directory:
#   export DATA_DIR=$HOME/workspaces/aquatic-mapping/src/sampling/data/missions
#   docker compose up sim1
# Or use the run-trial.sh script which handles this automatically.

volumes:
  simulation-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${DATA_DIR:?ERROR: DATA_DIR must be set to your missions data directory}
