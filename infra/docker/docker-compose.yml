# Docker Compose for Aquatic Mapping Simulations
#
# Usage:
#   Single simulation:
#     docker compose up sim1
#
#   Multiple simulations:
#     docker compose up sim1 sim2 sim3
#
#   Scale (all same config):
#     docker compose up --scale sim=5
#
#   Custom trial:
#     TRIAL_ID=5 FIELD_TYPE=x_compress docker compose up sim1

version: "3.8"

# Common configuration anchor
x-sim-common: &sim-common
  build:
    context: .
    dockerfile: Dockerfile
  image: aquatic-sim:latest
  privileged: false
  # Resource limits
  deploy:
    resources:
      limits:
        cpus: "2.0"
        memory: 4G
      reservations:
        cpus: "1.0"
        memory: 2G
  # Shared volume for data output
  volumes:
    - simulation-data:/home/simuser/aquatic-mapping/src/sampling/data/missions
    - /tmp/.X11-unix:/tmp/.X11-unix:rw
  # Restart policy
  restart: "no"
  # Network mode
  networks:
    - simnet

services:
  # ============================================================================
  # Individual simulation containers with unique ports and domain IDs
  # ============================================================================

  sim1:
    <<: *sim-common
    container_name: aquatic-sim-1
    environment:
      - TRIAL_ID=1
      - FIELD_TYPE=${FIELD_TYPE:-radial}
      - ROS_DOMAIN_ID=1
      - HEADLESS=1
      - VNC_PORT=5901
      - NOVNC_PORT=6081
      - PX4_MODEL=${PX4_MODEL:-gz_r1_rover}
    ports:
      - "5901:5901"   # VNC
      - "6081:6081"   # noVNC web
      - "14541:14540" # PX4 MAVLINK

  sim2:
    <<: *sim-common
    container_name: aquatic-sim-2
    environment:
      - TRIAL_ID=2
      - FIELD_TYPE=${FIELD_TYPE:-radial}
      - ROS_DOMAIN_ID=2
      - HEADLESS=1
      - VNC_PORT=5902
      - NOVNC_PORT=6082
      - PX4_MODEL=${PX4_MODEL:-gz_r1_rover}
    ports:
      - "5902:5902"
      - "6082:6082"
      - "14542:14540"

  sim3:
    <<: *sim-common
    container_name: aquatic-sim-3
    environment:
      - TRIAL_ID=3
      - FIELD_TYPE=${FIELD_TYPE:-radial}
      - ROS_DOMAIN_ID=3
      - HEADLESS=1
      - VNC_PORT=5903
      - NOVNC_PORT=6083
      - PX4_MODEL=${PX4_MODEL:-gz_r1_rover}
    ports:
